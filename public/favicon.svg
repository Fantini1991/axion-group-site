<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060918"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <ellipse cx="180" cy="160" rx="200" ry="180" fill="#22d3ee" opacity="0.06"/>
  <!-- "A" shape using lines -->
  <path d="M136 368 L256 112 L376 368" stroke="url(#grad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crossbar of A -->
  <line x1="176" y1="280" x2="336" y2="280" stroke="url(#grad)" stroke-width="44" stroke-linecap="round"/>
</svg>
